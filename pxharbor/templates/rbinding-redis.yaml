apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.roleBinding1.name }}
  namespace: {{ .Values.roleBinding1.originalns }}
  annotations:
    argocd.argoproj.io/sync-wave: "-4"
subjects:
  - kind: ServiceAccount
    name: {{ .Values.roleBinding1.serviceAccountName }}
    namespace: {{ .Values.roleBinding1.serviceAccountNamespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Values.roleBinding1.roleName }}
